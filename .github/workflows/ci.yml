name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate Codex skills
        run: python .github/scripts/validate_skills.py

  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - full
          - safe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Build ${{ matrix.variant }} variant
        run: gradle --no-daemon build -PhaVariant=${{ matrix.variant }}

      - name: Upload ${{ matrix.variant }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hashimotoaddons-${{ matrix.variant }}
          path: |
            build/libs/**/*.jar
            !build/libs/**/*-dev.jar
          if-no-files-found: error
          retention-days: 14
